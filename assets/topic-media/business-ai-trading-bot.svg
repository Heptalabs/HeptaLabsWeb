  <text x="120" y="365" fill="#f8fafc" font-size="82" font-weight="800" font-family="Sora, Arial, sans-serif">AI TRADING BOT</text>
  <text x="120" y="430" fill="#a5f3fc" font-size="30" font-weight="500" font-family="Space Grotesk, Arial, sans-serif">Algorithmic hedge strategy with controlled risk exposure</text>
