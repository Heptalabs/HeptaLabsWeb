<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d">
  <title id="t">AI Trading Bot</title>
  <desc id="d">An AI trading visual with neural rings and strategy nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <radialGradient id="ring" cx="72%" cy="34%" r="42%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
