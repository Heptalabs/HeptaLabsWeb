<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Platform Maintenance Window</title>
  <desc id="desc">Dark abstract notice card for platform maintenance schedule.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f16"/>
      <stop offset="100%" stop-color="#171f2e"/>
    </linearGradient>
    <radialGradient id="orb" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="220" cy="120" r="320" fill="url(#orb)"/>
  <rect x="120" y="170" width="960" height="380" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.28)"/>
  <text x="180" y="300" fill="#ffffff" font-size="64" font-family="Sora, Arial, sans-serif" font-weight="700">Maintenance Window</text>
  <text x="180" y="370" fill="#9ca3af" font-size="34" font-family="Space Grotesk, Arial, sans-serif">Platform Stability Update</text>
</svg>
