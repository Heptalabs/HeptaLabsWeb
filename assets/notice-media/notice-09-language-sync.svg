<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Language Sync Notice</title>
  <desc id="desc">Multilingual symbol visual for language sync notice.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1118"/>
      <stop offset="100%" stop-color="#213449"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="260" cy="360" r="160" fill="rgba(56,189,248,0.2)"/>
  <circle cx="460" cy="360" r="160" fill="rgba(148,163,184,0.2)"/>
  <circle cx="360" cy="260" r="160" fill="rgba(226,232,240,0.18)"/>
  <rect x="600" y="170" width="480" height="380" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.24)"/>
  <text x="650" y="320" fill="#ffffff" font-size="54" font-family="Sora, Arial, sans-serif" font-weight="700">Language Sync</text>
  <text x="650" y="382" fill="#cbd5e1" font-size="30" font-family="Space Grotesk, Arial, sans-serif">KO / EN / ZH Parity</text>
</svg>
