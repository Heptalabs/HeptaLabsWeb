<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Support Hours Notice</title>
  <desc id="desc">Clock visual for support hours adjustment notice.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101318"/>
      <stop offset="100%" stop-color="#1d2638"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="910" cy="355" r="170" fill="none" stroke="rgba(226,232,240,0.85)" stroke-width="18"/>
  <line x1="910" y1="355" x2="910" y2="275" stroke="#e2e8f0" stroke-width="16" stroke-linecap="round"/>
  <line x1="910" y1="355" x2="970" y2="390" stroke="#e2e8f0" stroke-width="16" stroke-linecap="round"/>
  <rect x="120" y="170" width="660" height="370" rx="26" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.24)"/>
  <text x="180" y="315" fill="#ffffff" font-size="56" font-family="Sora, Arial, sans-serif" font-weight="700">Support Hours Update</text>
  <text x="180" y="378" fill="#cbd5e1" font-size="31" font-family="Space Grotesk, Arial, sans-serif">09:00 - 22:00 KST</text>
</svg>
