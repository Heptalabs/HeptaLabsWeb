<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hepta Labs | Future Infrastructure</title>
    <meta
      name="description"
      content="Hepta Labs company profile with multilingual support, day/night themes, and dynamic business portfolio pages."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <div class="page-bg" aria-hidden="true"></div>
    <div class="orb orb-top" data-depth="18" aria-hidden="true"></div>
    <div class="orb orb-bottom" data-depth="24" aria-hidden="true"></div>

    <header class="site-header reveal">
      <a class="brand" href="./index.html" aria-label="Hepta Labs home">
        <span class="brand-mark">H</span>
        <span class="brand-word">HEPTA LABS</span>
      </a>

      <nav class="primary-nav" data-primary-nav></nav>

      <div class="header-controls">
        <button class="icon-btn" type="button" data-theme-toggle aria-label="Toggle theme"></button>
        <div class="lang-switch" role="group" aria-label="Language switcher">
          <button type="button" data-lang="ko">KO</button>
          <button type="button" data-lang="en">EN</button>
          <button type="button" data-lang="zh">ZH</button>
        </div>
        <a class="admin-chip" href="./admin/" data-admin-link>Admin</a>
      </div>
    </header>

    <main class="home-main">
      <section class="hero reveal">
        <p class="hero-kicker" data-home-kicker></p>
        <h1 data-home-title></h1>
        <p class="hero-line" data-home-line1></p>
        <p class="hero-line" data-home-line2></p>
        <p class="hero-line" data-home-line3></p>
        <div class="hero-actions">
          <a class="cta primary" data-home-cta-primary href="#footer-panel"></a>
          <a class="cta ghost" data-home-cta-secondary href="./detail.html?menu=about&item=hepta-labs"></a>
        </div>
      </section>

      <section class="spotlight-grid reveal" data-home-cards></section>

      <section class="footer-panel reveal" id="footer-panel">
        <div class="footer-brand-block">
          <div class="brand-mark-lg">H</div>
          <p class="footer-brand-name">HEPTA LABS</p>
          <p data-footer-copyright></p>
          <p data-footer-community></p>
        </div>
        <div class="footer-columns" data-footer-columns></div>
      </section>
    </main>

    <script src="./content.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
