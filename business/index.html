<!DOCTYPE html>
<html lang="ko" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hepta Labs | Business</title>
    <meta name="description" content="Hepta Labs business and company detail pages." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="../assets/brand/favicon.svg" />
    <link rel="shortcut icon" href="../assets/brand/favicon.svg" />
    <link rel="stylesheet" href="../styles.css?v=20260425defaultNight1" />
  </head>
  <body data-page="detail">
    <div class="page-bg" aria-hidden="true"></div>
    <div class="orb orb-top" data-depth="18" aria-hidden="true"></div>
    <div class="orb orb-bottom" data-depth="24" aria-hidden="true"></div>

    <header class="site-header reveal">
      <a class="brand" href="/main" aria-label="Hepta Labs home">
        <img class="brand-logo brand-logo-day" src="../assets/brand/logo-lr-black.svg" alt="Hepta Labs" />
        <img class="brand-logo brand-logo-night" src="../assets/brand/logo-lr-white.svg" alt="Hepta Labs" />
      </a>

      <nav class="primary-nav" data-primary-nav></nav>

      <div class="header-controls">
        <button class="icon-btn" type="button" data-theme-toggle aria-label="Toggle theme"></button>
        <div class="lang-switch" role="group" aria-label="Language switcher">
          <button type="button" data-lang="ko">KO</button>
          <button type="button" data-lang="en">EN</button>
          <button type="button" data-lang="zh">ZH</button>
        </div>
      </div>
    </header>

    <main class="detail-main">
      <aside class="detail-side reveal">
        <ul class="detail-list" data-detail-item-list></ul>
      </aside>

      <article class="detail-content reveal">
        <p class="detail-path" data-detail-path></p>
        <h1 data-detail-title></h1>
        <p class="detail-subtitle" data-detail-subtitle></p>

        <div class="section-stack" data-detail-sections></div>
      </article>
    </main>

    <section class="footer-panel reveal">
      <div class="footer-brand-block">
        <div class="footer-brand-lockup">
          <img class="footer-brand-logo footer-brand-logo-day" src="../assets/brand/logo-ud-white.svg" alt="Hepta Labs" />
          <img class="footer-brand-logo footer-brand-logo-night" src="../assets/brand/logo-ud-black.svg" alt="Hepta Labs" />
        </div>
        <p data-footer-copyright></p>
        <p data-footer-community></p>
      </div>
      <div class="footer-columns" data-footer-columns></div>
    </section>

    <script src="../content.js?v=20260425defaultNight1"></script>
    <script src="../app.js?v=20260425defaultNight1"></script>
  </body>
</html>
