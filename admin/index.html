<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hepta Labs | Admin</title>
    <meta name="description" content="Hepta Labs local CMS admin page." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="../assets/brand/favicon.svg" />
    <link rel="shortcut icon" href="../assets/brand/favicon.svg" />
    <link rel="stylesheet" href="../styles.css?v=20260324notice10" />
  </head>
  <body data-page="admin">
    <div class="page-bg" aria-hidden="true"></div>

    <header class="site-header reveal admin-header">
      <a class="brand" href="../index.html" aria-label="Hepta Labs home">
        <img class="brand-logo brand-logo-day" src="../assets/brand/logo-lr-black.svg" alt="Hepta Labs" />
        <img class="brand-logo brand-logo-night" src="../assets/brand/logo-lr-white.svg" alt="Hepta Labs" />
      </a>

      <nav class="primary-nav admin-nav">
        <a href="../index.html" data-admin-home-link></a>
        <a href="../detail.html?menu=about&item=hepta-labs" data-admin-detail-link></a>
      </nav>

      <div class="header-controls">
        <button
          class="cta ghost small"
          type="button"
          id="admin-logout"
          data-admin-logout
          hidden
        ></button>
        <button class="icon-btn" type="button" data-theme-toggle aria-label="Toggle theme"></button>
        <div class="lang-switch" role="group" aria-label="Language switcher">
          <button type="button" data-lang="ko">KO</button>
          <button type="button" data-lang="en">EN</button>
          <button type="button" data-lang="zh">ZH</button>
        </div>
      </div>
    </header>

    <section class="admin-auth-wrap reveal" id="admin-auth-wrap">
      <div class="admin-auth-card">
        <h1 data-admin-auth-title></h1>
        <p class="admin-auth-subtitle" data-admin-auth-subtitle></p>
        <form id="admin-login-form" class="admin-auth-form" autocomplete="off">
          <div class="field-group">
            <label for="admin-login-id" data-admin-auth-id-label></label>
            <input id="admin-login-id" type="text" autocomplete="username" required />
          </div>
          <div class="field-group">
            <label for="admin-login-password" data-admin-auth-password-label></label>
            <input
              id="admin-login-password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button class="cta primary full" type="submit" data-admin-login-submit></button>
        </form>
        <p class="admin-auth-note" data-admin-auth-note></p>
        <p class="admin-auth-status" id="admin-auth-status" aria-live="polite"></p>
      </div>
    </section>

    <main class="admin-main reveal" id="admin-main" hidden>
      <section class="admin-panel">
        <h1 data-admin-title></h1>
        <p class="admin-subtitle" data-admin-subtitle></p>

        <div class="admin-grid">
          <div class="admin-card">
            <h2 data-admin-select-heading></h2>
            <div class="field-group">
              <label for="admin-menu" data-admin-label-menu></label>
              <select id="admin-menu"></select>
            </div>
            <div class="field-group">
              <label for="admin-item" data-admin-label-item></label>
              <select id="admin-item"></select>
            </div>
            <div class="field-group">
              <p class="field-label" data-admin-label-language></p>
              <div class="lang-switch" id="admin-lang-tabs">
                <button type="button" data-admin-lang="ko">KO</button>
                <button type="button" data-admin-lang="en">EN</button>
                <button type="button" data-admin-lang="zh">ZH</button>
              </div>
            </div>
            <a class="cta ghost small" id="admin-preview" target="_blank" rel="noreferrer" data-admin-preview></a>
          </div>

          <div class="admin-card admin-editor" id="admin-editor">
            <h2 data-admin-edit-heading></h2>
            <div class="field-group">
              <label for="admin-title-input" data-admin-label-title></label>
              <input id="admin-title-input" type="text" />
            </div>
            <div class="field-group">
              <label for="admin-subtitle-input" data-admin-label-subtitle></label>
              <textarea id="admin-subtitle-input" rows="4"></textarea>
            </div>
            <div class="field-group">
              <label for="admin-feature-media-type" data-admin-label-feature-media-type></label>
              <select id="admin-feature-media-type">
                <option value="image" data-admin-media-type-image></option>
                <option value="video" data-admin-media-type-video></option>
              </select>
            </div>
            <div class="field-group">
              <label for="admin-feature-image-input" data-admin-label-feature-image></label>
              <input id="admin-feature-image-input" type="url" placeholder="https://..." />
            </div>
            <div class="field-group">
              <label for="admin-feature-image-alt-input" data-admin-label-feature-alt></label>
              <input id="admin-feature-image-alt-input" type="text" />
            </div>
            <div class="field-group">
              <label for="admin-feature-image-file" data-admin-label-feature-upload></label>
              <input id="admin-feature-image-file" type="file" accept="image/*,video/*" />
            </div>

            <div class="sections-wrap">
              <div class="section-header-row">
                <p data-admin-sections-heading></p>
                <button class="cta ghost small" id="admin-add-section" type="button" data-admin-add-section></button>
              </div>
              <div id="admin-sections"></div>
            </div>
          </div>
        </div>

        <div class="admin-actions">
          <button class="cta primary" id="admin-save" type="button" data-admin-save></button>
          <button class="cta ghost" id="admin-reset-item" type="button" data-admin-reset-item></button>
          <button class="cta ghost" id="admin-reset-all" type="button" data-admin-reset-all></button>
          <button class="cta ghost" id="admin-export" type="button" data-admin-export></button>
          <label class="cta ghost file-btn" for="admin-import" data-admin-import></label>
          <input id="admin-import" type="file" accept="application/json" />
        </div>

        <p class="admin-status" id="admin-status" aria-live="polite"></p>

        <div class="admin-card json-card">
          <h2 data-admin-json-heading></h2>
          <pre id="admin-json"></pre>
        </div>

        <div class="admin-card admin-advanced-card">
          <h2 data-admin-advanced-heading></h2>
          <p class="admin-advanced-subtitle" data-admin-advanced-subtitle></p>
          <div class="admin-module-tabs" id="admin-module-tabs">
            <button type="button" data-admin-module="news"></button>
            <button type="button" data-admin-module="notice"></button>
            <button type="button" data-admin-module="qna"></button>
            <button type="button" data-admin-module="site"></button>
          </div>
          <div id="admin-module-content"></div>
        </div>
      </section>
    </main>

    <script src="../content.js?v=20260324notice10"></script>
    <script src="../app.js?v=20260324notice10"></script>
  </body>
</html>
